<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <title>Colight Ellipsoid FPS Bench</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
          "Courier New", monospace;
        background: #101215;
        color: #f4f7fb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow-x: auto;
        background:
          radial-gradient(circle at top, rgba(103, 167, 255, 0.18), transparent 36%),
          linear-gradient(180deg, #161a21 0%, #0d0f13 100%);
      }

      #root {
        min-width: 1120px;
      }

      .app-shell {
        display: grid;
        grid-template-columns: minmax(300px, 340px) minmax(720px, 1fr);
        min-height: 100vh;
      }

      .controls-panel {
        padding: 18px 18px 20px;
        border-right: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(14, 17, 22, 0.86);
        backdrop-filter: blur(10px);
      }

      .panel-header h1 {
        margin: 0 0 6px;
        font-size: 20px;
        letter-spacing: 0.01em;
      }

      .panel-header p {
        margin: 0 0 14px;
        line-height: 1.4;
        font-size: 12px;
        color: rgba(244, 247, 251, 0.76);
      }

      label {
        display: block;
        margin-bottom: 10px;
        font-size: 11px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: rgba(244, 247, 251, 0.85);
      }

      input,
      select {
        width: 100%;
        margin-top: 4px;
        padding: 8px 10px;
        border-radius: 9px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.06);
        color: inherit;
        font: inherit;
      }

      .control-cluster {
        margin-bottom: 12px;
        padding: 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.035);
      }

      .size-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .compact-grid {
        margin-top: 2px;
      }

      .button-grid {
        margin-bottom: 12px;
      }

      .run-button {
        width: 100%;
        margin: 0;
        padding: 10px 12px;
        border: 0;
        border-radius: 12px;
        background: linear-gradient(135deg, #8ec5ff, #4aa3ff);
        color: #03101d;
        font-weight: 700;
        cursor: pointer;
        font: inherit;
      }

      .run-button:disabled {
        opacity: 0.55;
        cursor: default;
      }

      .status-card {
        margin-bottom: 12px;
        padding: 12px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.05);
        line-height: 1.45;
        font-size: 12px;
      }

      .status-card pre {
        overflow: auto;
        margin-top: 8px;
        padding: 8px;
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.24);
      }

      .error-text {
        color: #ff8e8e;
      }

      .results-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 11px;
      }

      .results-table th,
      .results-table td {
        padding: 7px 5px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        text-align: left;
      }

      .results-wrap {
        max-height: calc(100vh - 420px);
        overflow: auto;
      }

      .viewer-panel {
        padding: 18px;
      }

      .viewer-meta {
        display: flex;
        gap: 16px;
        margin-bottom: 10px;
        color: rgba(244, 247, 251, 0.72);
        font-size: 12px;
        flex-wrap: wrap;
      }

      .scene-shell {
        overflow: hidden;
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 18px 80px rgba(0, 0, 0, 0.35);
        background:
          radial-gradient(circle at top, rgba(98, 175, 255, 0.18), transparent 35%),
          #04070b;
      }

      .scene-placeholder {
        display: grid;
        place-items: center;
        width: 100%;
        height: 100%;
        color: rgba(244, 247, 251, 0.55);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="/packages/colight/src/colight/js-dist/ellipsoid-bench.js"></script>
  </body>
  </html>
